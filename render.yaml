services:
  - type: web
    name: my-assistant-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: weather
        sync: false
      - key: CHROMA_PERSIST_DIR
        value: ./faiss_index
